definitions:
- &page_title >-
    {{ page.meta.get("title") or page.title }}

# Falls back to the site description so pages without a `description:` in their
# frontmatter still get on-brand card copy instead of a blank lower half.
- &page_description >-
    {{ page.meta.get("description") or config.site_description }}

- &page_title_with_site_name >-
  {%- if not page.is_homepage -%}
    {{ config.site_name }} - {{ page.meta.get("title", page.title) }}
  {%- else -%}
    {{ page.meta.get("title", page.title) }}
  {%- endif -%}

tags:

  og:type: website
  og:title: *page_title_with_site_name
  og:description: *page_description
  og:image: "{{ image.url }}"
  og:image:type: "{{ image.type }}"
  og:image:width: "{{ image.width }}"
  og:image:height: "{{ image.height }}"
  og:url: "{{ page.canonical_url }}"

  twitter:card: summary_large_image
  twitter:title: *page_title_with_site_name
  twitter:description: *page_description
  twitter:image: "{{ image.url }}"


size: { width: 1200, height: 630 }
layers:

# Brand surface — near-black (--almost-black, #0A0A0A). Dark-only theme.
  - background:
      color: "#0A0A0A"

# Quix wordmark (white/mono 2025 logo), top-left. Box matches the logo's
# 3.32:1 aspect (438x132) so it scales without distortion. Copied to a
# paren-free filename because parenthesised asset names 404 in the build.
  - size: { width: 166, height: 50 }
    offset: { x: 144, y: 64 }
    background:
      image: layouts/quix-logo-white.png

# Brand accent bar — orange (--orange, #FF8400).
  - size: { width: 64, height: 6 }
    offset: { x: 144, y: 138 }
    background:
      color: "#FF8400"

# Page title
  - size: { width: 912, height: 230 }
    offset: { x: 144, y: 178 }
    typography:
      content: *page_title
      overflow: shrink
      align: start
      color: "#FFFFFF"
      line:
        amount: 3
        height: 1.25
      font:
        family: Geist
        style: SemiBold

# Page description — 72% white (brand body-text opacity).
  - size: { width: 912, height: 140 }
    offset: { x: 144, y: 438 }
    typography:
      content: *page_description
      overflow: truncate
      align: start bottom
      color: "#FFFFFFB8"
      line:
        amount: 3
        height: 1.5
      font:
        family: Geist
        style: Regular
